<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMK Developer | Personal Website</title>
  <meta name="description" content="Modern personal portfolio built with Flutter Web">
  
  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
  
  <!-- Theme Colors -->
  <meta name="theme-color" content="#0F172A">
  <meta name="color-scheme" content="dark">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* CSS Variables */
    :root {
      --bg-primary: #0F172A;
      --bg-secondary: #1E293B;
      --accent-primary: #38BDF8;
      --accent-secondary: #F43F5E;
      --text-primary: #E2E8F0;
      --text-secondary: #94A3B8;
    }
    
    /* Reset */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    /* Base Styles */
    html {
      font-size: 16px;
      scroll-behavior: smooth;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }
    
    /* Loading Spinner */
    .loader {
      width: 60px;
      height: 60px;
      border: 4px solid var(--bg-secondary);
      border-top-color: var(--accent-primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* Hero Text */
    .hero {
      text-align: center;
      margin-top: 2rem;
    }
    
    .hero h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    
    .hero h1 span {
      color: var(--accent-primary);
    }
    
    .hero p {
      color: var(--text-secondary);
      font-size: 1.125rem;
      font-weight: 300;
    }
    
    /* Links */
    .nav-links {
      display: flex;
      gap: 1.5rem;
      margin-top: 2rem;
    }
    
    .nav-links a {
      color: var(--text-primary);
      text-decoration: none;
      font-weight: 500;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      transition: all 0.2s ease;
    }
    
    .nav-links a:hover {
      color: var(--accent-primary);
      background: rgba(56, 189, 248, 0.1);
    }
    
    /* Footer */
    footer {
      position: fixed;
      bottom: 1rem;
      color: var(--text-secondary);
      font-size: 0.875rem;
    }
    
    /* Responsive */
    @media (max-width: 640px) {
      .hero h1 {
        font-size: 1.75rem;
      }
      
      .nav-links {
        flex-wrap: wrap;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <!-- Loading Spinner -->
  <div class="loader"></div>
  
  <!-- Hero Section -->
  <div class="hero">
    <h1><span>AMK</span> Developer</h1>
    <p>Building digital experiences that matter</p>
    
    <!-- Navigation Links -->
    <div class="nav-links">
      <a href="#">Home</a>
      <a href="#">Dashboard</a>
      <a href="#">Projects</a>
      <a href="#">About</a>
    </div>
  </div>
  
  <!-- Footer -->
  <footer>
    © 2024 AMK Developer • Built with Flutter
  </footer>
  
  <script>
    // Optional: Add simple interactivity
    document.querySelectorAll('.nav-links a').forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        // Could integrate with Flutter routing here
      });
    });
  </script>
</body>
</html>
