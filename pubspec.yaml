name: amkdev_website
description: AMK Developer Personal Website with Flutter Web
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Router - for navigation (/, /dashboard, /projects, /about)
  go_router: ^14.0.0
  
  # Animations - for smooth entrance & effects
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true